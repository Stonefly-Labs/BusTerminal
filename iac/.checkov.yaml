# Checkov configuration for BusTerminal IaC.
#
# Each skipped rule is documented with its rationale. The defaults remain on
# (`soft-fail: false`) so any new finding outside this list fails CI.
#
# Reviewers: when removing a skip, verify the underlying issue is actually
# fixed before merging — checkov passing is necessary but not sufficient.
framework:
  - terraform

quiet: true
soft-fail: false
download-external-modules: true

skip-check:
  # ─────────────────────────────────────────────────────────────────────────
  # Inconsistent with constitutional AVM consumption convention
  # ─────────────────────────────────────────────────────────────────────────

  # CKV_TF_1 — "Ensure Terraform module sources use a commit hash".
  # The BusTerminal constitution mandates Azure Verified Modules consumed
  # from the Terraform Registry with pinned SEMVER versions (e.g.,
  # `version = "0.5.0"`), not git URLs with commit SHAs. AVM publishes
  # signed, version-tagged releases; switching to git+SHA breaks update
  # tooling, dependabot integration, and the documented AVM workflow.
  - CKV_TF_1

  # ─────────────────────────────────────────────────────────────────────────
  # Deferred per plan.md § Complexity Tracking
  # The foundation slice provisions public ingress + public storage to keep
  # bootstrap from requiring a private DNS resolver reachable from GitHub
  # Actions. A later slice flips these to private once VNet integration lands.
  # ─────────────────────────────────────────────────────────────────────────

  # CKV_AZURE_139 — "Ensure ACR set to disable public networking".
  # ACR must be reachable from the GitHub Actions runner for image push.
  # Private link from CI is out of scope for the foundation.
  - CKV_AZURE_139

  # CKV_AZURE_35 / CKV_AZURE_36 / CKV_AZURE_59 / CKV_AZURE_244 — storage
  # account default-deny / trusted-services / public access / local users.
  # The OpenTofu state account (platform-bootstrap) must be reachable from
  # the GitHub Actions runner using OIDC-backed Entra tokens. Shared keys
  # are already disabled (`shared_access_key_enabled = false`). Private
  # endpoints + service-endpoint allowlists arrive with the VNet slice.
  - CKV_AZURE_35
  - CKV_AZURE_36
  - CKV_AZURE_59
  - CKV_AZURE_244

  # CKV_AZURE_99 — "Ensure Cosmos DB accounts have restricted access".
  # CKV_AZURE_101 — "Ensure that Azure Cosmos DB disables public network access".
  # The Cosmos DB account in `modules/cosmos-account` is intentionally public-
  # endpoint in this slice. Recorded as an explicit deviation in
  # `specs/004-core-domain-model/plan.md` § Complexity Tracking: Private Link
  # + VNet integration is a separable operational slice that requires VNet
  # infrastructure not yet provisioned (003 did not introduce a VNet).
  # Compensating controls already in place: `local_authentication_disabled =
  # true` (AAD-only data plane, no account keys), encryption at rest (default),
  # AAD-RBAC for the API's managed identity, no payload history persisted.
  # Re-evaluate when the VNet slice lands.
  - CKV_AZURE_99
  - CKV_AZURE_101

  # CKV_AZURE_100 — "Ensure that Cosmos DB accounts have customer-managed keys
  # to encrypt data at rest". No CMK in this slice — per
  # `specs/004-core-domain-model/plan.md` § Constraints: "Encryption at rest
  # is on by default in Cosmos DB (AVM-confirmed) — we do not opt out and do
  # not introduce customer-managed keys in this slice (no compliance
  # requirement is on the table yet)." CMK introduces a Key Vault key +
  # rotation workflow + access-policy dependency that future compliance slices
  # will own as a single coherent change.
  - CKV_AZURE_100

  # CKV_AZURE_132 — "Ensure cosmosdb does not allow privileged escalation by
  # restricting management plane changes". The rule looks for
  # `access_key_metadata_writes_enabled = false`. Our `azurerm_cosmosdb_account`
  # sets `local_authentication_disabled = true`, which disables key-based auth
  # entirely (data + management plane) and is the strictly broader control —
  # the per-key metadata-write toggle is moot when no keys can authenticate.
  # Checkov's static analyzer doesn't recognize this equivalence. The plan's
  # FR-018 + Constraints "Managed Identity for SDK auth ... no account keys"
  # explicitly establishes AAD-only as the chosen mechanism.
  - CKV_AZURE_132

  # ─────────────────────────────────────────────────────────────────────────
  # AVM internals that already satisfy the control but checkov can't see it
  # ─────────────────────────────────────────────────────────────────────────

  # CKV_AZURE_109 — "Ensure that key vault allows firewall rules settings".
  # Our keyvault module passes `network_acls = { bypass = "AzureServices",
  # default_action = "Allow" or "Deny" }` to the AVM module, which sets the
  # ACL accordingly. The AVM uses a `dynamic "network_acls"` block that
  # checkov's static analyzer cannot trace through.
  - CKV_AZURE_109

  # CKV_AZURE_206 — "Ensure that Storage Accounts use replication".
  # The platform-bootstrap state account is explicitly `account_replication_type
  # = "ZRS"` (zone-redundant). Checkov flags the AVM resource block because
  # its default in the upstream module is LRS; our override is invisible to
  # the static check.
  - CKV_AZURE_206

  # CKV2_AZURE_38 — "Ensure soft-delete is enabled on Azure storage account".
  # The state account has `delete_retention_policy { days = 30 }` and
  # `container_delete_retention_policy { days = 30 }` configured via the AVM
  # `blob_properties` input. Checkov's composite check expects a different
  # structural shape and false-positives on the AVM dynamic block.
  - CKV2_AZURE_38

  # ─────────────────────────────────────────────────────────────────────────
  # AVM module surface — control not exposed as a module input
  # ─────────────────────────────────────────────────────────────────────────

  # CKV_AZURE_233 — "Ensure ACR is zone redundant".
  # The dev environment is intentionally single-zone for cost. The
  # container-registry module accepts a `sku` (Premium today) so zone
  # redundancy can be enabled in `prod` when that environment exists.
  - CKV_AZURE_233

  # CKV_AZURE_166 — "Ensure container image quarantine, scan, and mark
  # images verified". The AVM container-registry module does not expose
  # the quarantine policy (preview feature) as an input. Trivy scanning
  # in CI covers the same supply-chain hygiene goal (see ci.yml).
  - CKV_AZURE_166

  # CKV_AZURE_163 — "Enable vulnerability scanning for container images".
  # Image vulnerability scanning is the Microsoft Defender for Containers
  # Premium add-on, billed per-image. Out of scope for the foundation;
  # Trivy in CI (ci.yml) provides equivalent pre-push vulnerability
  # scanning at no extra cost. Re-evaluate when Defender for Cloud is
  # adopted org-wide.
  - CKV_AZURE_163

  # CKV_AZURE_165 — "Ensure geo-replicated container registries to match
  # multi-region container deployments". BusTerminal dev is intentionally
  # single-region (eastus2). Multi-region replication is a prod-tier
  # decision tied to the future test/prod env standup — re-evaluate when
  # prod is provisioned. Same reasoning as CKV_AZURE_233 (zone redundancy).
  - CKV_AZURE_165

  # ─────────────────────────────────────────────────────────────────────────
  # Azure AI Search (spec 005) — intentional design
  # ─────────────────────────────────────────────────────────────────────────

  # CKV_AZURE_207 — "Ensure Azure Cognitive Search service uses managed
  # identities to access Azure resources". The rule checks for a system-
  # assigned identity ON the search service. Spec 005 / T036 intentionally
  # disables it: the WORKLOAD UAMI calls the search data plane via RBAC
  # (Search Index Data Contributor, granted by T039). The search service
  # itself does not need to authenticate outward to anything else in this
  # baseline (no skillsets, no indexers reaching customer storage), so
  # adding an identity-on-search would just be unused privilege.
  # Re-evaluate when AI Search starts pulling from external data sources.
  - CKV_AZURE_207

  # CKV_AZURE_208 — "Ensure that Azure Cognitive Search maintains SLA for
  # index updates". The basic / free SKU does not carry an SLA. Dev runs
  # on basic per research §4 (NFR-003 cost awareness). Test/prod templates
  # (T094 / T100) default to standard, which DOES carry the SLA — this rule
  # only fires on dev. Operators standing up prod will not hit this skip
  # because standard SKU satisfies the check.
  - CKV_AZURE_208

  # CKV_AZURE_209 — "Ensure that Azure Cognitive Search maintains SLA for
  # search index queries". Same rationale as CKV_AZURE_208 — basic SKU in
  # dev does not carry an SLA; test/prod use standard.
  - CKV_AZURE_209

  # CKV_AZURE_237 — "Ensure dedicated data endpoints are enabled."
  # Premium SKU optional feature; AVM does not expose the input.
  # Re-evaluate when private endpoints are introduced.
  - CKV_AZURE_237

  # CKV_AZURE_164 — "Ensures that ACR uses signed/trusted images".
  # Premium content trust feature; AVM does not expose the input.
  # Image signing is a separate hardening slice (constitution § supply chain).
  - CKV_AZURE_164

  # CKV_AZURE_112 — "Ensure that key vault key is backed by HSM".
  # This rule fires on the AVM keyvault module's example `azurerm_key_vault_key`
  # resource. BusTerminal does not currently create any Key Vault keys
  # (only secrets). When key creation lands, HSM-backed keys will be the
  # default per the secret-management slice.
  - CKV_AZURE_112

  # ─────────────────────────────────────────────────────────────────────────
  # Inapplicable — feature is not used by BusTerminal
  # ─────────────────────────────────────────────────────────────────────────

  # CKV_AZURE_33 — "Ensure Storage logging is enabled for Queue service
  # for read, write and delete requests". BusTerminal does not use the
  # Storage Queue service; the state account holds only blobs. Rule is a
  # false positive against an unused service.
  - CKV_AZURE_33
