## Spec 009 — Local-stack additions
#
# Spec 009 adds the entity-discovery slice. It introduces two new Cosmos
# containers (`discovery-runs`, `discovery-locks`) on the existing canonical
# database, and one internal Service Bus queue (`discovery-requested`).
#
# Cosmos: the new containers are created on-demand by the API/Indexer at
# startup (see `scripts/seed-discovery-emulator.sh` for verification + a
# pointer to the Phase 2 T025 DI wiring that performs the create). No
# docker-compose change required — the existing cosmos-emulator service
# below covers the new containers transparently.
#
# Service Bus: NO Service Bus emulator is wired into this compose file
# (none of the existing slices needed one, and the Microsoft Service Bus
# emulator requires a companion SQL Edge container — non-trivial weight for
# a docker-compose default). Phase 3 / US1 worker integration tests use a
# recorded ARM HTTP fixture for ARM traffic and unit-test the queue publish
# path. End-to-end US1 verification (API → queue → worker) requires the
# dev Azure environment.
services:
  # Azure Cosmos DB Linux emulator for local integration tests against the canonical store
  # introduced by spec 004. AAD-RBAC against the emulator is on Microsoft's roadmap but not
  # yet GA, so the local persistence path uses the emulator's well-known master key, which
  # is published Microsoft public test data (not a secret). Production / dev Azure
  # environments always use Managed Identity / DefaultAzureCredential — never this key.
  cosmos-emulator:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-preview
    container_name: busterminal-cosmos-emulator
    # The vnext-preview image defaults to HTTP, but the .NET Cosmos SDK does not
    # support HTTP against the emulator (per MS Learn: "The .NET and Java SDKs
    # don't support HTTP mode in the emulator"). `--protocol https` flips the
    # gateway to HTTPS with a self-signed cert (our HttpClientHandler accepts
    # it via DangerousAcceptAnyServerCertificateValidator).
    command: ["--protocol", "https"]
    ports:
      - "8081:8081"
      - "8080:8080"
      - "10250-10255:10250-10255"
    environment:
      AZURE_COSMOS_EMULATOR_PARTITION_COUNT: "4"
      AZURE_COSMOS_EMULATOR_IP_ADDRESS_OVERRIDE: "127.0.0.1"
    # The dedicated health probe on port 8080 is plain HTTP (per MS Learn) and
    # is the supported way to gate readiness. The previous TLS healthcheck on
    # 8081 was misconfigured against the HTTP-default gateway.
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ready -o /dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  api:
    build:
      context: ./api
      dockerfile: BusTerminal.Api/Dockerfile
    image: busterminal/api:dev
    container_name: busterminal-api
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      AzureAd__Instance: https://login.microsoftonline.com/
      AzureAd__TenantId: development
      AzureAd__ClientId: 00000000-0000-0000-0000-000000000000
      AzureAd__Audience: api://busterminal-dev
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: busterminal/web:dev
    container_name: busterminal-web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api:8080
      AZURE_AD_TENANT_ID: development
      AZURE_AD_CLIENT_ID: mock-client
      AZURE_AD_CLIENT_SECRET: mock-secret
      NEXTAUTH_SECRET: dev-secret-do-not-use-in-prod
      AUTH_SECRET: dev-secret-do-not-use-in-prod
      AUTH_TRUST_HOST: "true"
