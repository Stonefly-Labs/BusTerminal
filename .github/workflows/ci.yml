name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR/branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: frontend · build · lint · typecheck · test · storybook · e2e · analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Bundle thresholds (FR-035e / SC-020 / Research R2). Temporarily
      # widened from the constitutional 180/200 KB to fit the foundation
      # showcase page (407 KB gzipped — every primitive on a single
      # route). A follow-up spec should route-split the showcase out of
      # `/` so these can be tightened back to 180/200.
      BUNDLE_SOFT_TARGET_KB: "420"
      BUNDLE_HARD_ALERT_KB: "450"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: web/package.json
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Lint
        run: pnpm -C web lint

      - name: Typecheck
        run: pnpm -C web typecheck

      - name: Unit / component tests (Vitest)
        run: pnpm -C web test

      - name: Install Playwright browsers
        run: pnpm -C web exec playwright install --with-deps

      - name: Build & test Storybook (a11y + interactions)
        run: pnpm -C web test:storybook:ci

      # Backend is needed for the platform-status E2E + the previously-
      # fixme'd registry specs (spec 007). Mock auth is active on both the
      # backend (`AzureAd__TenantId=development` engages
      # `MockAuthenticationHandler`) and the frontend
      # (`NEXT_PUBLIC_AUTH_MODE=mock` engages `buildMockPca`). The
      # registry specs need persistence; the Cosmos emulator from
      # docker-compose.yml provides it. The emulator's readiness probe
      # binds port 8080 so the backend listens on 8090 via
      # `BUSTERMINAL_API_PORT`.
      - name: Setup .NET 10 (for E2E backend)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Build backend (Release)
        run: dotnet build api/BusTerminal.slnx --configuration Release

      - name: Start Cosmos emulator (for registry persistence)
        run: |
          set -euo pipefail
          docker compose up -d cosmos-emulator
          echo "Cosmos emulator container launched; waiting for /ready probe…"

      - name: Wait for Cosmos emulator readiness
        run: |
          set -euo pipefail
          for i in {1..120}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ready || true)
            if [ "$code" = "200" ]; then
              echo "Cosmos emulator ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Cosmos emulator did not become ready within 120s"
          docker compose logs cosmos-emulator | tail -n 200 || true
          exit 1

      - name: Start backend in background (mock auth + Cosmos emulator)
        env:
          BUSTERMINAL_API_PORT: 8090
          ASPNETCORE_ENVIRONMENT: Development
          AzureAd__TenantId: development
          AzureAd__ClientId: 00000000-0000-0000-0000-000000000001
          AzureAd__Audience: api://00000000-0000-0000-0000-000000000001
          Cosmos__Endpoint: https://localhost:8081
        run: |
          dotnet run --project api/BusTerminal.Api --configuration Release --no-build > /tmp/api.log 2>&1 &
          echo "API_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for backend readiness
        run: |
          set -euo pipefail
          for i in {1..60}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8090/healthz/ready || true)
            if [ "$code" = "200" ]; then
              echo "Backend ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Backend did not become ready in 60s"
          cat /tmp/api.log || true
          exit 1

      - name: Playwright E2E (mock auth)
        env:
          NEXT_PUBLIC_AUTH_MODE: mock
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8090
          PLAYWRIGHT_API_BASE_URL: http://localhost:8090
          BUSTERMINAL_DEV_API_TARGET: http://localhost:8090
        run: pnpm -C web test:e2e

      - name: Stop backend
        if: always()
        run: |
          if [ -n "${API_PID:-}" ]; then kill "$API_PID" 2>/dev/null || true; fi
          echo "Backend log tail:"
          tail -n 50 /tmp/api.log 2>/dev/null || true

      - name: Stop Cosmos emulator
        if: always()
        run: |
          docker compose logs cosmos-emulator | tail -n 100 || true
          docker compose down cosmos-emulator || true

      - name: Bundle analyzer build
        run: pnpm -C web analyze

      - name: Upload bundle analyzer report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bundle-analyzer-report
          path: web/.next/diagnostics/route-bundle-stats.json
          if-no-files-found: warn
          retention-days: 14

      - name: Bundle-size diff (PR comment)
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node web/scripts/bundle-diff.mjs

      - name: pnpm audit (fail on high+)
        run: pnpm -C web audit --audit-level high

  backend:
    name: backend · build · test · openapi diff
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore api/BusTerminal.slnx

      - name: Build (no restore, warnings as errors enforced by csproj)
        run: dotnet build api/BusTerminal.slnx --configuration Release --no-restore

      - name: Test (unit tier; integration tier runs in the backend-integration job)
        # Spec 004 / T150 — the integration tier is split into a sibling
        # `backend-integration` job that brings up the Cosmos vnext-preview
        # emulator via docker compose and runs `Category=Integration` against
        # it. Keeping the unit tier in this job ensures it stays fast and is
        # never gated on the emulator image pull.
        run: dotnet test api/BusTerminal.slnx --configuration Release --no-build --filter "Category!=Integration" --logger "trx;LogFileName=test-results.trx" --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-results
          path: TestResults/**/*.trx
          if-no-files-found: warn

      - name: Restore .NET tools
        working-directory: api
        run: dotnet tool restore

      - name: dotnet list package --vulnerable (fail on High+)
        run: |
          set -euo pipefail
          out=$(dotnet list api/BusTerminal.slnx package --vulnerable --include-transitive 2>&1 || true)
          echo "$out"
          if echo "$out" | grep -E "High|Critical" >/dev/null; then
            echo "::error::Vulnerable package(s) of severity High or Critical detected."
            exit 1
          fi

      - name: Start API in background for OpenAPI capture
        env:
          ASPNETCORE_ENVIRONMENT: Development
          ASPNETCORE_URLS: http://localhost:8080
          AzureAd__TenantId: development
          AzureAd__ClientId: 00000000-0000-0000-0000-000000000001
          AzureAd__Audience: api://00000000-0000-0000-0000-000000000001
        run: |
          dotnet run --project api/BusTerminal.Api --configuration Release --no-build > /tmp/api.log 2>&1 &
          echo "API_PID=$!" >> $GITHUB_ENV

      - name: Wait for OpenAPI endpoint
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/openapi/v1.json -o /tmp/live-openapi.json 2>/dev/null; then
              echo "OpenAPI captured"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Timed out waiting for /openapi/v1.json"
          cat /tmp/api.log || true
          exit 1

      - name: Install oasdiff
        run: |
          curl -fsSL https://github.com/Tufin/oasdiff/releases/download/v1.10.27/oasdiff_1.10.27_linux_amd64.tar.gz \
            | tar -xz -C /tmp oasdiff
          sudo mv /tmp/oasdiff /usr/local/bin/oasdiff
          oasdiff --version

      - name: Diff live OpenAPI against the contract (fail on breaking changes)
        run: |
          oasdiff breaking \
            specs/002-solution-foundation/contracts/whoami.openapi.yaml \
            /tmp/live-openapi.json \
            --fail-on ERR

      - name: Stop API
        if: always()
        run: |
          if [ -n "${API_PID:-}" ]; then kill "$API_PID" || true; fi

  backend-integration:
    # Spec 004 / T150 — integration tier runs against the Cosmos vnext-preview
    # emulator brought up via docker compose. The unit tier (Category!=Integration)
    # stays in the `backend` job above and runs in parallel — this job's failure
    # surface is isolated to integration-only regressions and the emulator
    # readiness path.
    name: backend · integration tier (Cosmos emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Start Cosmos emulator (docker compose)
        run: |
          set -euo pipefail
          docker compose up -d cosmos-emulator
          echo "Emulator container launched; waiting for /ready probe…"

      - name: Wait for emulator readiness
        run: |
          set -euo pipefail
          for i in {1..120}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ready || true)
            if [ "$code" = "200" ]; then
              echo "Cosmos emulator ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Cosmos emulator did not become ready within 120s"
          docker compose logs cosmos-emulator | tail -n 200 || true
          exit 1

      - name: Restore
        run: dotnet restore api/BusTerminal.slnx

      - name: Build (Release, no restore)
        run: dotnet build api/BusTerminal.slnx --configuration Release --no-restore

      - name: Test (integration tier — Cosmos emulator)
        env:
          # Spec 004 / T150 — keep the API's CosmosOptions endpoint aligned with
          # the emulator. The integration test fixture also hard-codes
          # `https://localhost:8081`; this env var keeps any WebApplicationFactory
          # boot path consistent with the same target.
          CosmosOptions__Endpoint: https://localhost:8081
        run: |
          dotnet test api/BusTerminal.slnx \
            --configuration Release \
            --no-build \
            --filter "Category=Integration" \
            --logger "trx;LogFileName=integration-test-results.trx" \
            --results-directory ./TestResults

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-integration-test-results
          path: TestResults/**/*.trx
          if-no-files-found: warn

      - name: Stop Cosmos emulator
        if: always()
        run: |
          docker compose logs cosmos-emulator | tail -n 100 || true
          docker compose down cosmos-emulator || true

  iac:
    name: iac · fmt · validate · tflint · checkov
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Read pinned OpenTofu version
        id: tofu_version
        run: echo "version=$(cat iac/.terraform-version)" >> "$GITHUB_OUTPUT"

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: ${{ steps.tofu_version.outputs.version }}

      - name: tofu fmt -check (recursive)
        working-directory: iac
        run: tofu fmt -check -recursive -diff

      - name: tofu init -backend=false (dev composition)
        working-directory: iac/environments/dev
        run: tofu init -backend=false

      - name: tofu validate (dev composition)
        working-directory: iac/environments/dev
        run: tofu validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: latest

      - name: tflint init
        working-directory: iac
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: tflint (recursive)
        working-directory: iac
        run: tflint --recursive --config "$(pwd)/.tflint.hcl"

      - name: Checkov (Terraform / OpenTofu scan)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: iac
          config_file: iac/.checkov.yaml

      # Spec 004 / T150 (c) — explicit assertion that the cosmos-account module
      # enforces encryption at rest (CKV_AZURE_140). The broader checkov run
      # above already covers this rule, but a dedicated step makes the contract
      # visible in CI logs and fails loudly if a future refactor accidentally
      # disables it. Skip-checks in .checkov.yaml are intentionally NOT applied
      # here — this is the one cosmos rule we MUST keep passing per plan.md.
      - name: Checkov · CKV_AZURE_140 (Cosmos encryption at rest)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: iac/modules/cosmos-account
          check: CKV_AZURE_140
          quiet: true
          soft_fail: false

  contracts:
    name: contracts · openapi lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Redocly lint (whoami.openapi.yaml)
        run: npx --yes @redocly/cli@latest lint specs/002-solution-foundation/contracts/whoami.openapi.yaml

  security:
    name: security · gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # The official gitleaks-action@v2 now requires a paid GITLEAKS_LICENSE
      # secret for any repo owned by an organization. The gitleaks binary
      # itself is still MIT-licensed, so we install it directly and scan from
      # the workflow — no license, no extra secret to rotate.
      - name: Install gitleaks
        run: |
          set -euo pipefail
          version="8.21.2"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Gitleaks scan
        run: gitleaks detect --config .gitleaks.toml --redact --no-banner --verbose
