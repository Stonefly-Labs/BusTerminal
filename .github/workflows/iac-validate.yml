name: IaC · validate · plan

on:
  pull_request:
    branches: [main]
    paths:
      - "iac/**"
      - ".github/workflows/iac-validate.yml"

concurrency:
  group: iac-validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  validate:
    name: fmt · validate · tflint · checkov
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Read pinned OpenTofu version
        id: tofu_version
        run: echo "version=$(cat iac/.terraform-version)" >> "$GITHUB_OUTPUT"

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: ${{ steps.tofu_version.outputs.version }}

      - name: tofu fmt -check (recursive)
        working-directory: iac
        run: tofu fmt -check -recursive -diff

      # Spec 005 / Polish / T126 — fail the build when a module's README
      # drifts from its variables.tf / outputs.tf. Run locally with
      # `terraform-docs -c iac/.terraform-docs.yml iac` (no --output-check)
      # to regenerate; the inject markers preserve the hand-written prose.
      #
      # We install terraform-docs directly (rather than using the
      # `terraform-docs/gh-actions@v1` wrapper) so we can pin the version
      # exactly. The wrapper's v1.4.1 image ships terraform-docs v0.20.0,
      # which emits different table-separator whitespace (`|------|`) than
      # the v0.24.0 release contributors install via Homebrew (`| ---- |`).
      # Pinning here matches the latest stable that `brew install terraform-docs`
      # produces; bump in lockstep with contributor-local versions.
      - name: Install terraform-docs (pinned)
        env:
          TERRAFORM_DOCS_VERSION: v0.24.0
        run: |
          set -euo pipefail
          curl -sSLo /tmp/terraform-docs.tar.gz \
            "https://github.com/terraform-docs/terraform-docs/releases/download/${TERRAFORM_DOCS_VERSION}/terraform-docs-${TERRAFORM_DOCS_VERSION}-linux-amd64.tar.gz"
          tar -xzf /tmp/terraform-docs.tar.gz -C /tmp terraform-docs
          sudo mv /tmp/terraform-docs /usr/local/bin/terraform-docs
          terraform-docs --version

      - name: terraform-docs (module READMEs in sync)
        run: terraform-docs --config iac/.terraform-docs.yml --output-check iac

      - name: tofu init -backend=false (dev composition)
        working-directory: iac/environments/dev
        run: tofu init -backend=false

      - name: tofu validate (dev composition)
        working-directory: iac/environments/dev
        run: tofu validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: latest

      - name: tflint init
        working-directory: iac
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: tflint (recursive)
        working-directory: iac
        run: tflint --recursive --config "$(pwd)/.tflint.hcl"

      - name: Checkov (Terraform / OpenTofu scan)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: iac
          config_file: iac/.checkov.yaml

      # Spec 003 / US5 / T078 — fail the build if a new `azurerm_role_assignment`,
      # `azurerm_user_assigned_identity`, `azurerm_federated_identity_credential`,
      # or `azuread_application_federated_identity_credential` lands inline at
      # `iac/environments/*/main.tf`. Identity / federation / RBAC must compose
      # from the modules under `iac/modules/`. Allowlist with rationale lives
      # inside the script.
      - name: Lint · no inline IAM in env compositions
        run: ./scripts/lint-iac-inline-iam.sh

      # Spec 003 / Polish / T101 — fail the build on any new inline
      # Azure-service connection-string / account-key / SAS-token / shared-
      # access-key assignment inside `iac/` HCL. Future-proofs FR-015 as
      # later slices land Cosmos / AI Search / Storage / OpenAI / Service Bus
      # / App Configuration resources. Allowlist with rationale lives inside
      # the script.
      - name: Lint · no inline Azure-service credentials
        run: ./scripts/lint-iac-inline-credentials.sh

  plan-dev:
    name: tofu plan (dev) · PR comment
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 15
    environment: dev
    env:
      ARM_USE_OIDC: "true"
      ARM_USE_AZUREAD: "true"
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_subscription_id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_github_org_repo: ${{ github.repository }}
      TF_VAR_unique_suffix: ${{ vars.UNIQUE_SUFFIX_DEV }}
      TF_VAR_entra_tenant_id: ${{ vars.ENTRA_TENANT_ID_DEV }}
      TF_VAR_entra_api_client_id: ${{ vars.ENTRA_API_CLIENT_ID_DEV }}
      TF_VAR_entra_web_client_id: ${{ vars.ENTRA_WEB_CLIENT_ID_DEV }}
      TF_VAR_kv_operator_object_ids: ${{ vars.KV_OPERATOR_OBJECT_IDS_DEV }}
      # The plan uses placeholder image refs — actual rollouts happen via cd-dev.yml.
      TF_VAR_backend_image: "mcr.microsoft.com/azuredocs/aci-helloworld:latest"
      TF_VAR_frontend_image: "mcr.microsoft.com/azuredocs/aci-helloworld:latest"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Read pinned OpenTofu version
        id: tofu_version
        run: echo "version=$(cat iac/.terraform-version)" >> "$GITHUB_OUTPUT"

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: ${{ steps.tofu_version.outputs.version }}

      - name: Azure login (OIDC federated)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: tofu init (azurerm backend via OIDC)
        working-directory: iac/environments/dev
        run: |
          tofu init \
            -backend-config="resource_group_name=${{ vars.TFSTATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT_NAME }}" \
            -backend-config="container_name=${{ vars.TFSTATE_CONTAINER_NAME }}" \
            -backend-config="subscription_id=${{ vars.AZURE_SUBSCRIPTION_ID }}" \
            -backend-config="tenant_id=${{ vars.AZURE_TENANT_ID }}" \
            -backend-config="client_id=${{ vars.AZURE_CLIENT_ID }}"

      - name: tofu plan
        working-directory: iac/environments/dev
        id: plan
        run: |
          set +e
          # `-lock-timeout=300s` lets the plan wait up to 5 minutes if a
          # concurrent `tofu apply` (typically `cd-dev.yml` triggered by a
          # push to `main`) is holding the state lock. Without this, plan
          # exits 1 on lock contention and the PR check flakes for reasons
          # unrelated to the diff. 5 minutes comfortably covers a worst-case
          # cd-dev apply window.
          tofu plan -no-color -lock-timeout=300s -out=tfplan > plan.out 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          # Cap comment size at ~60KB to stay under the GitHub comment limit.
          # `head -c` can truncate mid-line; without a trailing newline, the
          # subsequent `echo 'PLAN_EOF'` would append to the unterminated last
          # line — producing a heredoc with no line that is exactly "PLAN_EOF"
          # and breaking GITHUB_OUTPUT parsing. Force a trailing newline.
          head -c 60000 plan.out > plan.trimmed
          printf '\n' >> plan.trimmed
          {
            echo 'plan<<PLAN_EOF'
            cat plan.trimmed
            echo 'PLAN_EOF'
          } >> "$GITHUB_OUTPUT"

      # Spec 005 / US6 / T118 — convert the binary tfplan to JSON so the
      # custom policy gate (and checkov's plan framework) can read it.
      # Only meaningful when the plan command itself succeeded (exit 0 or 2).
      - name: tofu show -json tfplan
        if: steps.plan.outputs.exit_code == '0' || steps.plan.outputs.exit_code == '2'
        working-directory: iac/environments/dev
        run: tofu show -json tfplan > tfplan.json

      # Spec 005 / US6 / T118 — custom policy gate (BT-IAC-001..007).
      # Emits Markdown to stdout (captured for the PR comment) and a JSON
      # detail report to policies-report.json. Writes
      # `requires-manual-approval.flag` next to the report when BT-IAC-007
      # fires — the approval-gate job below consumes that flag.
      - name: Custom IaC policy gate (BT-IAC-001..007)
        if: steps.plan.outputs.exit_code == '0' || steps.plan.outputs.exit_code == '2'
        id: policy_gate
        working-directory: iac/environments/dev
        run: |
          set +e
          bash "$GITHUB_WORKSPACE/iac/policies/run-policies.sh" \
            --plan tfplan.json \
            --env dev \
            --allowlist "$GITHUB_WORKSPACE/iac/policies/allowlist.json" \
            --composition-dir . \
            --report policies-report.json \
            > policies-summary.md 2> policies-stderr.log
          rc=$?
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
          if [ -f requires-manual-approval.flag ]; then
            echo "requires_manual_approval=true" >> "$GITHUB_OUTPUT"
          else
            echo "requires_manual_approval=false" >> "$GITHUB_OUTPUT"
          fi
          {
            echo '## Custom IaC policy gate'
            echo ''
            cat policies-summary.md
            if [ -s policies-stderr.log ]; then
              echo ''
              echo '<details><summary>Rule failure detail (stderr)</summary>'
              echo ''
              echo '```'
              cat policies-stderr.log
              echo '```'
              echo ''
              echo '</details>'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          # Surface failures, but DO NOT exit non-zero from this step — the
          # approval-gate job is the authoritative blocker so reviewers see
          # the full plan + policy summary as a PR comment first.
          exit 0

      # Spec 005 / US6 / T118 — checkov against the resolved plan (catches
      # post-render issues the source-HCL scan would miss).
      - name: Checkov (Terraform plan scan)
        if: steps.plan.outputs.exit_code == '0' || steps.plan.outputs.exit_code == '2'
        uses: bridgecrewio/checkov-action@v12
        with:
          file: iac/environments/dev/tfplan.json
          framework: terraform_plan
          config_file: iac/.checkov.yaml
          soft_fail: false

      # Spec 005 / US6 / T118 — tfsec on the iac/ tree.
      - name: tfsec (Terraform / OpenTofu scan)
        if: steps.plan.outputs.exit_code == '0' || steps.plan.outputs.exit_code == '2'
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: iac
          soft_fail: false

      # Spec 005 / US6 / T118 — upload the policy gate artifacts so the
      # approval-gate job (below) can consume requires-manual-approval.flag
      # and policies-report.json without re-running the plan.
      - name: Upload policy gate artifacts
        if: always() && (steps.plan.outputs.exit_code == '0' || steps.plan.outputs.exit_code == '2')
        uses: actions/upload-artifact@v7
        with:
          name: policy-gate-${{ github.run_id }}
          path: |
            iac/environments/dev/tfplan.json
            iac/environments/dev/policies-report.json
            iac/environments/dev/policies-summary.md
            iac/environments/dev/policies-stderr.log
            iac/environments/dev/requires-manual-approval.flag
          if-no-files-found: ignore
          retention-days: 14

      - name: Comment plan + policy summary on PR
        uses: actions/github-script@v9
        # The plan-comment is a reviewer convenience, not a gate. Transient
        # GitHub API failures (e.g., 401 Bad credentials on a token that
        # logs as PullRequests: write) shouldn't fail the IaC check —
        # the dedicated "Fail job if plan errored" + approval-gate jobs
        # are the authoritative pass/fail signal.
        continue-on-error: true
        env:
          # Pass the plan text via an env var, not via `${{ ... }}` expression
          # interpolation directly into the script body. The plan output can
          # contain backticks (e.g., AVM deprecation warnings like
          # ``metric`` has been deprecated…``) which would otherwise close
          # the JS template literal early and break script parsing with
          # `SyntaxError: Unexpected identifier 'metric'`.
          PLAN: ${{ steps.plan.outputs.plan }}
          POLICY_GATE_RC: ${{ steps.policy_gate.outputs.exit_code }}
          REQUIRES_APPROVAL: ${{ steps.policy_gate.outputs.requires_manual_approval }}
        with:
          script: |
            const fs = require('fs');
            const plan = process.env.PLAN || '(empty plan output)';
            let policySummary = '(policy gate did not run)';
            try {
              policySummary = fs.readFileSync('iac/environments/dev/policies-summary.md', 'utf8');
            } catch (e) {
              // Policy gate didn't run (e.g., plan errored) — leave the placeholder.
            }
            const approvalBadge = process.env.REQUIRES_APPROVAL === 'true'
              ? '\n> ⚠️ **REQUIRES MANUAL APPROVAL** — BT-IAC-007 detected a stateful destroy. The `iac-stateful-change-approval` job is failing intentionally; a maintainer must re-run it after reviewing the destroy.\n'
              : '';
            const body = [
              '### OpenTofu plan — `dev`',
              approvalBadge,
              '```',
              plan,
              '```',
              '',
              policySummary,
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail job if plan errored
        if: steps.plan.outputs.exit_code != '0' && steps.plan.outputs.exit_code != '2'
        run: |
          echo "::error::tofu plan exited with ${{ steps.plan.outputs.exit_code }}"
          exit 1

      - name: Fail job if policy gate failed
        if: steps.policy_gate.outputs.exit_code != '0' && steps.policy_gate.outputs.exit_code != ''
        run: |
          echo "::error::custom IaC policy gate exited with ${{ steps.policy_gate.outputs.exit_code }} — see policies-summary.md / policies-stderr.log artifacts"
          exit 1

  # Spec 005 / US6 / T119 — separate manual-approval gate job.
  # Fails the workflow run when BT-IAC-007 flagged a stateful destroy.
  # GitHub's "Re-run failed jobs" UI doubles as the manual override: a
  # maintainer reviews the plan + policy summary in the PR comment, then
  # re-runs this single job after acknowledging the destructive change.
  iac-stateful-change-approval:
    name: IaC stateful change approval gate (BT-IAC-007)
    runs-on: ubuntu-latest
    needs: plan-dev
    if: always() && needs.plan-dev.result == 'success'
    timeout-minutes: 5
    steps:
      - name: Download policy gate artifacts
        uses: actions/download-artifact@v4
        with:
          name: policy-gate-${{ github.run_id }}
          path: ./policy-gate
        continue-on-error: true

      - name: Check for stateful-destroy flag
        run: |
          set -euo pipefail
          if [ -f ./policy-gate/requires-manual-approval.flag ]; then
            echo "::error::BT-IAC-007 detected a stateful destroy in this plan. Manual reviewer approval required."
            echo ""
            echo "Review the plan + policy summary posted to the PR. If the destroy is intentional:"
            echo "  1. Document the rationale in the PR description."
            echo "  2. Add an allowlist entry under BT-IAC-007 in iac/policies/allowlist.json."
            echo "  3. A maintainer re-runs THIS job to acknowledge the destructive change."
            echo ""
            echo "If the destroy is unintentional, fix the underlying module change and push a new commit."
            if [ -f ./policy-gate/policies-stderr.log ]; then
              echo ""
              echo "--- policy gate stderr ---"
              cat ./policy-gate/policies-stderr.log
            fi
            exit 1
          fi
          echo "BT-IAC-007: no stateful destroys detected. Approval gate cleared."
