openapi: 3.1.0
info:
  title: BusTerminal Registry API
  version: 1.0.0
  description: |
    REST surface for the Service Bus registry slice (spec 006).
    Authentication: every endpoint requires a valid Entra ID JWT bearer token.
    Authorization: any authenticated tenant user may read AND write (FR-037 — see plan.md Complexity Tracking).
    Concurrency: PUT/DELETE use ETag-based optimistic concurrency. Stale-version writes return 409 with the body shape in `conflict-response.schema.json`.

servers:
  - url: https://{frontendHost}/api
    variables:
      frontendHost:
        default: bt-dev-api.example.com

security:
  - bearerAuth: []

tags:
  - name: Registry
    description: CRUD on every registry entity type via a single canonical surface.
  - name: Search
    description: Full-text search over the registry.
  - name: Audit
    description: Entity-scoped append-only audit log.

paths:
  /registry:
    get:
      tags: [Registry]
      summary: List entities (paginated, filterable).
      description: Server-side filtered and paginated list. Use this for the explorer tree (browse). Backed by Cosmos, NOT by the search index (FR-026).
      parameters:
        - $ref: '#/components/parameters/EnvironmentQuery'
        - name: entityType
          in: query
          schema: { type: string, enum: [Namespace, Queue, Topic, Subscription, Rule] }
        - name: parentId
          in: query
          schema: { type: string, format: uuid }
        - name: status
          in: query
          schema: { type: string, enum: [Active, Deprecated] }
        - name: pageSize
          in: query
          schema: { type: integer, minimum: 1, maximum: 500, default: 200 }
        - name: continuationToken
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Paginated list.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/RegistryEntity' }
                  continuationToken: { type: string, nullable: true }
        '401': { $ref: '#/components/responses/Unauthorized' }

    post:
      tags: [Registry]
      summary: Create an entity.
      description: Creates a Namespace, Queue, Topic, Subscription, or Rule. `entityType` discriminates. Server-validates parent existence (FR-008), name uniqueness within parent+env scope (FR-014), and Azure resource ID format when present (Edge Case).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateEntityRequest' }
      responses:
        '201':
          description: Created.
          headers:
            ETag:    { schema: { type: string }, description: Optimistic-concurrency token for subsequent PUT. }
            Location: { schema: { type: string, format: uri } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RegistryEntity' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409':
          description: Duplicate name within parent + env scope (FR-014).
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /registry/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }

    get:
      tags: [Registry]
      summary: Get an entity by id.
      description: Backed by Cosmos point-read (FR-026, FR-044).
      responses:
        '200':
          description: Found.
          headers:
            ETag: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RegistryEntity' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404':
          description: Not found.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

    put:
      tags: [Registry]
      summary: Update an entity.
      description: |
        Optimistic-concurrency-guarded update (FR-020). Client MUST include `If-Match: <etag>`.
        On stale ETag, returns 409 with `conflict-response.schema.json`.
        Force-overwrite path: re-submit with `If-Match: <currentEtag>` AND request-body extension `_overwriteAcknowledged: true`.
      parameters:
        - in: header
          name: If-Match
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateEntityRequest' }
      responses:
        '200':
          description: Updated.
          headers:
            ETag: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RegistryEntity' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404':
          description: Not found.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '409':
          description: Concurrency conflict (FR-020) OR force-overwrite-without-conflict.
          content:
            application/problem+json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ConflictResponse'
                  - $ref: '#/components/schemas/Problem'

    delete:
      tags: [Registry]
      summary: Delete an entity (hard delete; blocked when children exist).
      description: |
        FR-013 hard delete. Rejected with 409 when the entity has registered children (FR-009).
        Optimistic-concurrency-guarded via If-Match.
        Internal mechanism is tombstone-then-delete so the change feed propagates the delete to the AI Search index (research §10).
      parameters:
        - in: header
          name: If-Match
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Deleted.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404':
          description: Not found.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '409':
          description: Has children (FR-009) or stale ETag.
          content:
            application/problem+json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/HasChildrenResponse'
                  - $ref: '#/components/schemas/ConflictResponse'

    get_audit_redirect:
      # Stub: actual audit is at /registry/{id}/audit (see next path).

  /registry/{id}/audit:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Audit]
      summary: Get the most recent audit events for an entity.
      description: Entity-scoped audit list (FR-033). Append-only; users cannot modify or delete events (FR-034).
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        '200':
          description: Audit events, newest first.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/AuditEvent' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /registry/environments:
    get:
      tags: [Registry]
      summary: List the distinct environments currently present in the registry.
      description: |
        Populates the explorer's environment switcher (FR-035). Cross-partition distinct query against `registry-entities`; cached server-side for 60s.
      responses:
        '200':
          description: Sorted distinct environments.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /registry/search:
    get:
      tags: [Search]
      summary: Full-text search over the registry.
      description: |
        Backed by Azure AI Search (FR-022, FR-023). May return results that lag the persistent store by a few seconds (FR-025, SC-005). Browse and detail experiences are NOT served from this endpoint (FR-026).
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string, minLength: 1, maxLength: 1024 }
        - name: entityType
          in: query
          schema: { type: string, enum: [Namespace, Queue, Topic, Subscription, Rule] }
        - name: environment
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, enum: [Active, Deprecated] }
        - name: tagKey
          in: query
          schema: { type: string }
          description: Case-insensitive key match (FR-023).
        - name: tagValue
          in: query
          schema: { type: string }
          description: Case-sensitive value match (FR-023).
        - name: sort
          in: query
          schema: { type: string, enum: [relevance, name_asc, updated_desc], default: relevance }
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: pageSize
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
      responses:
        '200':
          description: Search results.
          content:
            application/json:
              schema:
                type: object
                required: [items, totalCount, page, pageSize]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/SearchResult' }
                  totalCount: { type: integer }
                  page:       { type: integer }
                  pageSize:   { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503':
          description: Search backend temporarily unavailable (Edge Case "Indexer failure"; SC-011 — browse/detail remain available).
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    EnvironmentQuery:
      name: environment
      in: query
      required: true
      schema: { type: string }
      description: Scope every browse / list query to a single environment partition.

  responses:
    Unauthorized:
      description: Missing or invalid authentication.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    ValidationError:
      description: Request payload failed validation (FR-016).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }

  schemas:
    RegistryEntity:
      $ref: 'registry-entity.schema.json'

    CreateEntityRequest:
      description: Same shape as RegistryEntity minus server-managed fields (id, createdAtUtc, updatedAtUtc, source, fullyQualifiedName, _etag).
      allOf:
        - $ref: 'registry-entity.schema.json'

    UpdateEntityRequest:
      description: Same shape as RegistryEntity. May include `_overwriteAcknowledged: true` to acknowledge a prior conflict and force overwrite.
      type: object
      additionalProperties: true
      properties:
        _overwriteAcknowledged:
          type: boolean
          description: When true, signals the user has explicitly chosen to overwrite a detected conflict (FR-020). Rejected with 400 if no conflict is detected.

    AuditEvent:
      $ref: 'audit-event.schema.json'

    ConflictResponse:
      $ref: 'conflict-response.schema.json'

    HasChildrenResponse:
      type: object
      additionalProperties: false
      required: [type, title, status, code, childCount, childrenByType]
      properties:
        type:    { type: string, format: uri, const: 'https://busterminal.dev/probs/has-children' }
        title:   { type: string, const: 'Entity has children' }
        status:  { type: integer, const: 409 }
        code:    { type: string, const: 'HasChildren' }
        detail:  { type: string }
        childCount: { type: integer, minimum: 1 }
        childrenByType:
          type: object
          additionalProperties: { type: integer, minimum: 0 }

    SearchResult:
      type: object
      additionalProperties: false
      required: [id, entityType, name, environment, status]
      properties:
        id:           { type: string, format: uuid }
        entityType:   { type: string, enum: [Namespace, Queue, Topic, Subscription, Rule] }
        name:         { type: string }
        fullyQualifiedName: { type: string, nullable: true }
        environment:  { type: string }
        status:       { type: string, enum: [Active, Deprecated] }
        owner:        { type: string, nullable: true }
        namespaceName: { type: string, nullable: true }
        score:        { type: number }
        highlights:
          type: object
          additionalProperties:
            type: array
            items: { type: string }

    Problem:
      description: RFC 7807 problem document.
      type: object
      required: [type, title, status]
      properties:
        type:     { type: string, format: uri }
        title:    { type: string }
        status:   { type: integer }
        detail:   { type: string }
        instance: { type: string }
        code:     { type: string }
        errors:
          type: array
          items:
            type: object
            properties:
              field:   { type: string }
              message: { type: string }
