openapi: 3.1.0
info:
  title: BusTerminal Platform API — Foundation Surface
  version: 0.1.0
  description: |
    The single public API surface introduced by the solution-foundation slice
    (`specs/002-solution-foundation`). This contract exists solely to prove
    that authentication, token validation, trace context propagation, and
    centralized telemetry all work end-to-end in the deployed environment.

    Domain APIs (Service Bus registry, governance, observability) are
    introduced by later slices and live in their own contract files.
servers:
  - url: https://{backendHost}
    description: BusTerminal backend
    variables:
      backendHost:
        default: api-bt-dev.<containerappsenv>.eastus2.azurecontainerapps.io
        description: Backend Container Apps FQDN (per environment)
security:
  - EntraIdBearer: [access_as_user]
paths:
  /whoami:
    get:
      operationId: getWhoAmI
      summary: Identity round-trip diagnostic
      description: |
        Returns the calling principal's display identity and echoes the
        inbound W3C Trace Context correlation identifier. Used by the
        frontend's "platform status" page to demonstrate that sign-in,
        token validation, and trace propagation all work end-to-end.
      security:
        - EntraIdBearer: [access_as_user]
      parameters:
        - in: header
          name: traceparent
          required: false
          schema:
            type: string
            pattern: '^[0-9a-f]{2}-[0-9a-f]{32}-[0-9a-f]{16}-[0-9a-f]{2}$'
          description: |
            W3C Trace Context traceparent header propagated from the caller.
            If absent, the backend generates a new trace and includes its ID
            in the response. Mandatory per BusTerminal constitution on any
            UI-originated request.
        - in: header
          name: tracestate
          required: false
          schema:
            type: string
          description: |
            Optional W3C Trace Context tracestate header. Passed through
            unchanged in the response correlation block when present.
      responses:
        '200':
          description: Authenticated principal information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WhoAmIResponse'
              example:
                principal:
                  oid: 11111111-2222-3333-4444-555555555555
                  displayName: Chris House
                  preferredUsername: chris.house@example.com
                  tenantId: 99999999-aaaa-bbbb-cccc-dddddddddddd
                correlation:
                  traceId: 4bf92f3577b34da6a3ce929d0e0e4736
                  spanId: 00f067aa0ba902b7
                  receivedTraceparent: 00-4bf92f3577b34da6a3ce929d0e0e4736-00f067aa0ba902b7-01
                server:
                  environment: dev
                  revision: api-bt-dev--rev-0042
                  serverTimeUtc: 2026-05-16T17:45:12.482Z
        '401':
          description: |
            Missing or invalid Microsoft Entra ID bearer token. The response
            body is intentionally empty (RFC 6750 challenge in
            `WWW-Authenticate` header), avoiding any token-introspection leak.
          headers:
            WWW-Authenticate:
              schema:
                type: string
              description: 'Bearer realm="busterminal", error="invalid_token"'
        '503':
          description: |
            Backend is not ready (e.g., Entra ID metadata not yet fetched
            after cold start). Caller should retry with exponential backoff.
components:
  securitySchemes:
    EntraIdBearer:
      type: oauth2
      description: |
        Microsoft Entra ID bearer token obtained via the platform's Entra
        application registration. Required on every request — no anonymous
        access (per spec FR-062, FR-032).
      flows:
        authorizationCode:
          authorizationUrl: https://login.microsoftonline.com/{tenantId}/oauth2/v2.0/authorize
          tokenUrl: https://login.microsoftonline.com/{tenantId}/oauth2/v2.0/token
          scopes:
            access_as_user: Access BusTerminal on behalf of the signed-in user
  schemas:
    WhoAmIResponse:
      type: object
      required: [principal, correlation, server]
      properties:
        principal:
          $ref: '#/components/schemas/Principal'
        correlation:
          $ref: '#/components/schemas/Correlation'
        server:
          $ref: '#/components/schemas/ServerInfo'
    Principal:
      type: object
      description: |
        Identity information extracted from the validated access token.
        Excludes any claim not strictly necessary for the diagnostic
        display (no group memberships, no roles, no permissions — those
        will appear in later slices when authorization arrives).
      required: [oid, displayName, tenantId]
      properties:
        oid:
          type: string
          description: Object ID (UUID) of the signed-in principal in Entra ID.
        displayName:
          type: [string, "null"]
          description: Display name as known to Entra ID. Null when the access token did not carry a usable display-name claim.
        preferredUsername:
          type: [string, "null"]
          description: UPN-like identifier suitable for display. Optional; null when the access token did not carry a `preferred_username` claim.
        tenantId:
          type: string
          description: Entra ID tenant ID (UUID) the principal belongs to.
    Correlation:
      type: object
      description: |
        W3C Trace Context information for this request. The backend echoes
        the trace identifier it observed (either inbound from the caller
        or freshly generated) so the frontend can render it on the
        platform-status page for visible end-to-end correlation proof.
      required: [traceId, spanId]
      properties:
        traceId:
          type: string
          pattern: '^[0-9a-f]{32}$'
          description: 32-hex-character W3C trace-id for this request.
        spanId:
          type: string
          pattern: '^[0-9a-f]{16}$'
          description: 16-hex-character W3C parent-id of the span the backend recorded.
        receivedTraceparent:
          type: [string, "null"]
          description: |
            The exact traceparent header value the backend received, or null
            if the caller did not propagate one (which would itself be a
            violation of FR-022 and should be investigated).
    ServerInfo:
      type: object
      description: |
        Non-sensitive operational metadata helpful for diagnosing
        cross-environment issues from a deployed UI.
      required: [environment, revision, serverTimeUtc]
      properties:
        environment:
          type: string
          enum: [dev, test, prod, local]
        revision:
          type: string
          description: Container Apps revision suffix (or "local" when running locally).
        serverTimeUtc:
          type: string
          format: date-time
          description: Server-side UTC timestamp at the moment of response generation.
